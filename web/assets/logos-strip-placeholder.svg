  <rect width="1200" height="180" fill="#060910"/>
  <g fill="none" stroke="#ff8a1f" stroke-width="2" opacity=".85">
    <rect x="60" y="50" width="180" height="80" rx="16"/>
    <rect x="285" y="50" width="180" height="80" rx="16"/>
